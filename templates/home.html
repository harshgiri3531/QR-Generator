<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to QRGen</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #74ebd5, #929ed8);
            color: #333;
            margin: 0;
            padding: 0;
        }

        /* Navigation Bar */
        .navbar {
            display: flex;
            justify-content: flex-start;
            background-color: rgba(255, 255, 255, 0.2);
            padding: 15px 30px;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            backdrop-filter: blur(5px);
            z-index: 1000;
        }

        .navbar a {
            text-decoration: none;
            color: #2c3e50;
            margin-right: 20px;
            font-weight: bold;
            font-size: 1.1em;
            transition: color 0.3s ease;
        }

        .navbar a:hover {
            color: #ffffff;
        }

        /* Main content */
        .main-content {
            padding: 100px 50px 50px; /* Extra padding for nav bar */
            text-align: center;
        }

        h1 {
            font-size: 3em;
            color: #2c3e50;
        }

        p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        a.button-link {
            display: inline-block;
            text-decoration: none;
            background-color: #3498db;
            color: white;
            padding: 12px 24px;
            border-radius: 5px;
            font-size: 1em;
            transition: background-color 0.3s ease;
            cursor: pointer;
        }

        a.button-link:hover {
            background-color: #2980b9;
        }

        footer {
            margin-top: 80px;
            padding-top: 20px;
            border-top: 1px solid #ccc;
            font-size: 0.9em;
            text-align: center;
        }

        footer h3 {
            margin: 10px 0 5px;
            font-size: 1.2em;
        }

        /* Modal (login popup) */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 200;
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%;
            overflow: auto; 
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .modal-content h2 {
            margin-top: 0;
        }

        .modal-content input[type="text"],
        .modal-content input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .modal-content input[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .modal-content input[type="submit"]:hover {
            background-color: #2980b9;
        }

        .close {
            float: right;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            color: #999;
        }

        .close:hover {
            color: #333;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/login">Login</a>
    </div>

    <!-- Main content -->
    <div class="main-content">
        <h1>Welcome to QRGen!</h1>
        <p>This website allows you to generate QR codes from any text or URL easily and quickly.</p>
        <a class="button-link" id="qrGenBtn">Go to QR Code Generator</a>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2>Login yourself</h2>
        </div>
    </div>

    <footer>
        <h3>Created by:</h3>
        <p><strong>HARSH GIRI</strong></p>
        <p>Email: harshgoswami2610@gmail.com</p>
        <p>GitHub: <a href="https://github.com/yourusername" target="_blank">github.com/yourusername</a></p>
        <p>&copy; 2025 QRGen. All rights reserved.</p>
    </footer>

    <script>
        const qrBtn = document.getElementById('qrGenBtn');
        const modal = document.getElementById('loginModal');
        const closeBtn = document.getElementById('closeModal');
        const loginForm = document.getElementById('loginForm');

        let isLoggedIn = false; // fake login status

        qrBtn.addEventListener('click', function(event) {
            event.preventDefault();
            if (!isLoggedIn) {
                modal.style.display = 'block';
            } else {
                window.location.href = '/generate';
            }
        });

        closeBtn.addEventListener('click', function() {
            modal.style.display = 'none';
        });

        window.addEventListener('click', function(event) {
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        });

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Basic check (replace with real backend logic)
            if (username === 'admin' && password === 'password') {
                isLoggedIn = true;
                modal.style.display = 'none';
                alert('Login successful!');
                window.location.href = '/generate';
            } else {
                alert('Invalid credentials. Try admin / password for demo.');
            }
        });
    </script>

</body>
</html>
